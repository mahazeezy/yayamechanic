.booking-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(8,9,10,0.8) 0%,rgba(8,9,10,0.5) 100%)}

.booking-container{position:relative;z-index:2;width:100%;max-width:580px;margin:0 auto;padding:3rem 5%}
.booking-header{text-align:center;margin-bottom:2.5rem}
.booking-header .label{font-size:.75rem;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:.5rem}
.booking-header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.2rem,6vw,3.5rem);line-height:1}
.booking-header h1 span{color:var(--red)}

.form-card{background:rgba(17,19,21,0.92);backdrop-filter:blur(16px);border:1px solid rgba(240,165,0,0.15);border-radius:12px;padding:2rem}
.form-group{margin-bottom:1.2rem}
label{display:block;font-size:.8rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#aaa;margin-bottom:.4rem}
input,select,textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:.75rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;transition:border-color .2s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold)}
select option{background:var(--card);color:var(--text)}
textarea{resize:vertical;min-height:90px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.submit-btn{width:100%;background:var(--red);color:#fff;border:none;padding:1rem;border-radius:6px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:1rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:background .2s;margin-top:.5rem}
.submit-btn:hover{background:#c02820}
.form-note{text-align:center;font-size:.8rem;color:#666;margin-top:1rem}
.form-note a{color:var(--gold)}

.info-bar{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;margin-top:2rem}
.info-item{background:rgba(17,19,21,0.85);border:1px solid rgba(240,165,0,0.15);border-radius:8px;padding:.8rem 1.2rem;text-align:center;flex:1;min-width:140px}
.info-item strong{display:block;font-size:.7rem;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:.2rem}
.info-item span{font-size:.9rem;font-weight:500}

/* Slide in */
.slide-up{opacity:0;transform:translateY(30px);animation:slideUp .7s ease forwards}
@keyframes slideUp{to{opacity:1;transform:none}}
.d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.3s}

@media(max-width:600px){
  .form-row{grid-template-columns:1fr}
  .form-card{padding:1.4rem}
  .booking-container{padding:2rem 4%}
}
</style>
</head>

<div class="booking-hero">
  <div class="booking-bg"></div>
  <div class="booking-overlay"></div>
  <div class="booking-container">
    <div class="booking-header slide-up">
      <div class="label">Schedule Your Visit</div>
      <h1>BOOK AN <span>APPOINTMENT</span></h1>
    </div>

    <!-- REPLACE action="" with your Netlify form URL -->
    <form class="form-card slide-up d1" name="booking" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/thank-you">
      <input type="hidden" name="form-name" value="booking">
      <input type="hidden" name="bot-field" style="display:none">

      <div class="form-row">
        <div class="form-group">
          <label for="fname">First Name</label>
          <input type="text" id="fname" name="first_name" placeholder="John" required>
        </div>
        <div class="form-group">
          <label for="lname">Last Name</label>
          <input type="text" id="lname" name="last_name" placeholder="Doe" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="(646) 000-0000" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@email.com" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="date">Preferred Date</label>
          <input type="date" id="date" name="date" required>
        </div>
        <div class="form-group">
          <label for="time">Preferred Time</label>
          <select id="time" name="time" required>
            <option value="">Select time</option>
            <option>9:00 AM</option>
            <option>10:00 AM</option>
            <option>11:00 AM</option>
            <option>12:00 PM</option>
            <option>1:00 PM</option>
            <option>2:00 PM</option>
            <option>3:00 PM</option>
            <option>4:00 PM</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="service">Service Needed</label>
        <select id="service" name="service" required>
          <option value="">Select a service</option>
          <option>Engine Repair / Tune-Up</option>
          <option>Brake Service</option>
          <option>Oil Change</option>
